name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GROQ_API_KEY_I2: ${{ secrets.VITE_GROQ_API_KEY_I2 }}
          VITE_GROQ_API_KEY_A3: ${{ secrets.VITE_GROQ_API_KEY_A3 }}
          VITE_GROQ_API_KEY_R1: ${{ secrets.VITE_GROQ_API_KEY_R1 }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist